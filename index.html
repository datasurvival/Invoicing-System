<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ระบบลงทะเบียนเบิกจ่าย</title>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  
  <style>
    /* CSS เดิมของคุณ (ยกมาทั้งหมด) */
    body { font-family: 'Kanit', sans-serif; background: #3077df; margin: 0; padding: 40px 20px; min-height: 100vh; color: #fff; }
    .container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 40px; width: 100%; max-width: 1200px; margin: 0 auto; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); }
    .header { text-align: center; margin-bottom: 35px; }
    .header h2 { margin: 10px 0; font-weight: 600; font-size: 32px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .header p { color: rgba(255,255,255,0.8); font-weight: 300; font-size: 16px; }
    .money-bag-icon { width: 80px; height: 80px; margin-bottom: 10px; }
    .bag-color { fill: #80cbc4; } 
    .coin-color { fill: #ffca28; } 
    .form-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 250px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #fff; font-size: 15px; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .required { color: #ffeb3b; font-weight: bold; }
    input, select { width: 100%; padding: 12px 15px; border: none; border-radius: 12px; font-family: 'Kanit'; font-size: 14px; box-sizing: border-box; height: 48px; background: #fff; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease; }
    input:focus, select:focus { outline: none; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    input::placeholder { color: #aaa; }
    input[type="date"] { cursor: pointer; color: #333; }
    input[type="file"] { padding-top: 12px; background: rgba(255,255,255,0.9); }
    .table-responsive { overflow-x: auto; margin-top: 30px; background: rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
    table { width: 100%; border-collapse: separate; border-spacing: 0 5px; min-width: 1000px; }
    th { text-align: left; padding: 15px; font-size: 15px; background: rgba(0, 0, 0, 0.2); color: #fff; font-weight: 500; border-radius: 8px; white-space: nowrap; }
    td { padding: 5px; vertical-align: middle; }
    td input, td select { height: 40px; border-radius: 8px; font-size: 13px; background: rgba(255,255,255,0.9); border: 1px solid transparent; }
    td input:focus { border-color: #4b6cb7; }
    .btn-add { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-family: 'Kanit'; font-weight: 500; margin-top: 20px; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-add:hover { background: rgba(255, 255, 255, 0.3); }
    .btn-remove { background: #ff5252; color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .btn-remove:hover { background: #ff1744; transform: scale(1.1); }
    .btn-submit { width: 100%; padding: 18px; background: linear-gradient(90deg, #FFC107 0%, #FF9800 100%); border: none; border-radius: 16px; color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; margin-top: 40px; box-shadow: 0 10px 25px rgba(255, 152, 0, 0.4); transition: all 0.3s ease; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(255, 152, 0, 0.5); filter: brightness(1.1); }
    .select2-container .select2-selection--single { height: 40px !important; border-radius: 8px !important; border: none !important; background: rgba(255,255,255,0.9) !important; display: flex; align-items: center; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { color: #333 !important; padding-left: 10px; }
    .select2-dropdown { border: none !important; border-radius: 12px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.2) !important; background-color: #fff !important; }
    .select2-results__option { color: #333 !important; }
    .select2-search__field { color: #333 !important; border-radius: 8px !important; }
    .loading { display: none; text-align: center; margin-top: 15px; color: #fff; font-size: 16px; font-weight: 500; }
    .hint-text { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 6px; display: block;}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <svg class="money-bag-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path class="bag-color" d="M12,2C9,2 7,3.5 7,5.5C7,6.8 7.8,8 9.2,8.8L8.4,11.3C5.9,12.5 4,15 4,18C4,21 7.6,23 12,23C16.4,23 20,21 20,18C20,15 18.1,12.5 15.6,11.3L14.8,8.8C16.2,8 17,6.8 17,5.5C17,3.5 15,2 12,2M12,4C13.6,4 15,4.7 15,5.5C15,6.3 13.6,7 12,7C10.4,7 9,6.3 9,5.5C9,4.7 10.4,4 12,4M12,13C13.3,13 14.5,13.3 15.5,13.8L16.4,16.5C16.8,17 17,17.5 17,18C17,19.7 14.8,21 12,21C9.2,21 7,19.7 7,18C7,17.5 7.2,17 7.6,16.5L8.5,13.8C9.5,13.3 10.7,13 12,13Z"/>
      <path class="coin-color" d="M12,14.5C11.2,14.5 10.5,15.2 10.5,16C10.5,16.8 11.2,17.5 12,17.5C12.8,17.5 13.5,16.8 13.5,16C13.5,15.2 12.8,14.5 12,14.5M11,16C11,15.4 11.4,15 12,15C12.6,15 13,15.4 13,16C13,16.6 12.6,17 12,17C11.4,17 11,16.6 11,16Z"/>
      <path class="coin-color" d="M12,13.5A2.5,2.5 0 0,1 14.5,16A2.5,2.5 0 0,1 12,18.5A2.5,2.5 0 0,1 9.5,16A2.5,2.5 0 0,1 12,13.5M12,14A2,2 0 0,0 10,16A2,2 0 0,0 12,18A2,2 0 0,0 14,16A2,2 0 0,0 12,14Z"/>
      <path class="coin-color" d="M13,14.2V13H11V14.2C10.4,14.4 10,15 10,15.7V16.3C10,17.2 10.7,18 11.7,18.2V19H13V17.8C13.6,17.6 14,17 14,16.3V15.7C14,14.8 13.3,14 12.3,13.8M11.5,15.7C11.5,15.3 11.8,15 12.2,15C12.6,15 12.8,15.3 12.8,15.7V16H11.5V15.7M12.5,17.3C12.5,17.7 12.2,18 11.8,18C11.4,18 11.2,17.7 11.2,17.3V17H12.5V17.3Z" transform="translate(9, 2) scale(0.7)"/>
      <circle class="coin-color" cx="6" cy="12" r="1.5"/>
      <circle class="coin-color" cx="18" cy="12" r="1.5"/>
    </svg>
    <h2>ลงทะเบียนเบิกจ่าย</h2>
    <p>กรุณากรอกข้อมูลให้ครบถ้วนเพื่อเบิกจ่าย</p>
  </div>

  <form id="myForm" onsubmit="submitForm(event)">
    
    <div class="form-row">
      <div class="col">
        <label>📑 Reimbursement Type <span class="required">*</span></label>
        <select id="reimbursement" required onchange="checkPayToLogic()">
          <option value="" disabled selected>กำลังโหลดข้อมูล...</option>
        </select>
      </div>
      <div class="col">
        <label>👤 Pay To <span class="required">*</span></label>
        <input type="text" id="payTo" placeholder="ระบุผู้รับเงิน" required>
      </div>
    </div>

    <div class="form-row">
      <div class="col">
        <label>😊 ดำเนินการโดย (ชื่อ-นามสกุล) <span class="required">*</span></label>
        <input type="text" id="operator" placeholder="เช่น สมชาย ใจดี" required>
      </div>
      <div class="col">
        <label>📅 Payment Date (วันที่คาดว่าจะจ่าย) <span class="required">*</span></label>
        <input type="date" id="paymentDate" required>
      </div>
    </div>

    <div class="form-row">
      <div class="col">
        <label>💼 ตำแหน่ง (Position) <span class="required">*</span></label>
        <input type="text" id="position" required>
      </div>
      <div class="col">
        <label>👥 ทีม (Team) <span class="required">*</span></label>
        <input type="text" id="team" required>
      </div>
    </div>

    <div class="form-row">
      <div class="col">
        <label>🎯 วัตถุประสงค์ (Objective) <span class="required">*</span></label>
        <input type="text" id="objective" required>
      </div>
    </div>

    <div class="form-row">
      <div class="col">
        <label>📎 แนบไฟล์หลักฐาน <span class="required">*</span></label>
        <input type="file" id="fileAttach" accept=".jpg, .jpeg, .png" multiple required>
        <span class="hint-text">รองรับเฉพาะไฟล์รูปภาพ JPG/PNG (เลือกได้หลายรูป)</span>
      </div>
    </div>

    <div class="table-responsive">
      <table id="itemTable">
        <thead>
          <tr>
            <th width="13%">📅 Date <span class="required">*</span></th>
            <th width="13%">🔢 QT/Project <span class="required">*</span></th>
            <th width="30%">📝 Description <span class="required">*</span></th>
            <th width="15%">💰 Amount <span class="required">*</span></th>
            <th width="8%" style="text-align:center;">VAT 7%</th>
            <th width="8%">WHT %</th>
            <th width="5%"></th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
    
    <button type="button" class="btn-add" onclick="addNewRow()">+ เพิ่มรายการ</button>

    <button type="submit" class="btn-submit" id="submitBtn">🚀 ส่งข้อมูลลงทะเบียน</button>
    <div class="loading" id="loadingText">⏳ กำลังบันทึกข้อมูลและสร้างไฟล์ PDF...</div>

  </form>
</div>

<script>
  // ⚠️ 1. วางลิงก์ Web App ที่ Deploy ใหม่ตรงนี้ (ตัวที่ลงท้ายด้วย /exec)
  const API_URL = 'ใส่_URL_WEB_APP_ที่ก๊อปปี้มา_ตรงนี้';

  var dropdownMapping = [];
  var descOptions = []; 

  // เมื่อเว็บโหลดเสร็จ ให้วิ่งไปดึงข้อมูล Dropdown จาก Google Sheets
  $(document).ready(function() {
      fetch(API_URL + "?action=getOptions")
        .then(response => response.json())
        .then(data => {
            if(data.error) {
                Swal.fire('Error', 'โหลดข้อมูลตั้งต้นไม่สำเร็จ: ' + data.error, 'error');
            } else {
                initData(data);
            }
        })
        .catch(err => {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        });
  });

  function initData(data) {
    var reimSelect = document.getElementById("reimbursement");
    reimSelect.innerHTML = '<option value="" disabled selected>เลือกประเภท...</option>'; // ล้างข้อความ 'กำลังโหลด'
    dropdownMapping = data.reimbursement;
    data.reimbursement.forEach(r => {
      var opt = new Option(r[0], r[0]);
      reimSelect.add(opt);
    });
    descOptions = data.descriptions.map(d => d[0]).filter(d => d);
    addNewRow();
  }

  function addNewRow() {
    var table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
    var rowIdx = table.rows.length;
    var row = table.insertRow(rowIdx);
    
    var cellDate = row.insertCell(0);
    cellDate.innerHTML = `<input type="date" class="item-date" required>`;
    var cellProj = row.insertCell(1);
    cellProj.innerHTML = `<input type="text" class="item-project" placeholder="เลขที่..." required>`;

    var cellDesc = row.insertCell(2);
    var selectHtml = `<select class="desc-select" required style="width:100%"><option value="" disabled selected>ค้นหารายการ...</option>`;
    descOptions.forEach(opt => { selectHtml += `<option value="${opt}">${opt}</option>`; });
    selectHtml += `</select>`;
    cellDesc.innerHTML = selectHtml;

    var cellAmount = row.insertCell(3);
    cellAmount.innerHTML = `<input type="number" class="amount-input" step="0.01" placeholder="0.00" required>`;
    var cellVat = row.insertCell(4);
    cellVat.style.textAlign = "center";
    cellVat.innerHTML = `<input type="checkbox" class="vat-check" style="width:20px; height:20px; cursor:pointer;">`;

    var cellWht = row.insertCell(5);
    cellWht.innerHTML = `<input type="number" class="wht-input" step="0.5" placeholder="%" min="0">`;

    var cellAction = row.insertCell(6);
    if(rowIdx > 0) {
        cellAction.innerHTML = `<button type="button" class="btn-remove" onclick="removeRow(this)">×</button>`;
    }

    $(row).find('.desc-select').select2({
        placeholder: "เลือกรายการ...",
        allowClear: true,
        width: '100%',
        language: { noResults: function() { return "ไม่พบข้อมูล"; } }
    });
  }

  function removeRow(btn) {
    var row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
  }

  function checkPayToLogic() {
    var selectedType = document.getElementById("reimbursement").value;
    var payToInput = document.getElementById("payTo");
    var autoFillTypes = ["Petty Cash - Internal and HR", "Petty Cash - Production", "Reimburstment K. Phol", "Reimburstment K. Vich"];
    if (autoFillTypes.includes(selectedType)) {
      var found = dropdownMapping.find(r => r[0] === selectedType);
      var defaultValue = found && found[1] ? found[1] : selectedType; 
      payToInput.value = defaultValue;
      payToInput.readOnly = true;
    } else {
      payToInput.value = "";
      payToInput.readOnly = false;
      payToInput.placeholder = "ระบุผู้รับเงิน";
    }
  }

  function readFiles(files) {
    return Promise.all(Array.from(files).map(file => {
      return new Promise((resolve, reject) => {
        var reader = new FileReader();
        reader.onload = e => resolve({
          name: file.name,
          mimeType: file.type,
          data: e.target.result.split(',')[1] 
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }));
  }

  function submitForm(e) {
    e.preventDefault();
    
    var btn = document.getElementById('submitBtn');
    var loading = document.getElementById('loadingText');
    var fileInput = document.getElementById('fileAttach');
    if (fileInput.files.length === 0) { Swal.fire({ icon: 'warning', title: 'กรุณาแนบไฟล์', text: 'จำเป็นต้องแนบรูปภาพหลักฐาน' }); return; }
    
    var totalSize = 0;
    for(var i=0; i<fileInput.files.length; i++){ totalSize += fileInput.files[i].size; }
    if (totalSize > 20 * 1024 * 1024) { Swal.fire('ไฟล์รวมมีขนาดใหญ่เกินไป', 'กรุณาอัปโหลดรวมกันไม่เกิน 20MB', 'warning'); return; }

    var headerData = {
        reimbursement: document.getElementById("reimbursement").value,
        payTo: document.getElementById("payTo").value,
        operator: document.getElementById("operator").value,
        paymentDate: document.getElementById("paymentDate").value,
        position: document.getElementById("position").value,
        team: document.getElementById("team").value,
        objective: document.getElementById("objective").value
    };
    var items = [];
    var table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
    for (var i = 0; i < table.rows.length; i++) {
        var row = table.rows[i];
        var itemDateVal = row.querySelector('.item-date').value;
        var projectVal = row.querySelector('.item-project').value;
        var descVal = $(row).find('.desc-select').val();
        var amountVal = row.querySelector('.amount-input').value;
        var hasVat = row.querySelector('.vat-check').checked;
        var whtVal = row.querySelector('.wht-input').value;

        if(!itemDateVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุวันที่ (Date) ในรายการที่ ' + (i+1), 'warning'); return; }
        if(!projectVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุ QT/Project No. ในรายการที่ ' + (i+1), 'warning'); return; }
        if(!descVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกรายการ (Description)', 'warning'); return; }

        items.push({ 
            itemDate: itemDateVal,
            projectNo: projectVal,
            description: descVal, 
            amount: amountVal, 
            hasVat: hasVat, 
            whtPercent: whtVal 
        });
    }

    if(items.length === 0) { Swal.fire('Error', 'กรุณาเพิ่มรายการอย่างน้อย 1 รายการ', 'error'); return; }

    btn.style.display = 'none';
    loading.style.display = 'block';
    
    // แปลงไฟล์เป็น Base64 แล้วยิงไปหา Google Apps Script API
    readFiles(fileInput.files).then(function(fileObjs) {
        var formData = { header: headerData, items: items, files: fileObjs };
        
        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // จำเป็นมากเพื่อไม่ให้ติด CORS ของ Google
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(response => {
            loading.style.display = 'none';
            btn.style.display = 'block';
            if(response.success) {
                Swal.fire({
                    title: 'บันทึกสำเร็จ!',
                    html: `รหัสเอกสาร: <b>${response.docId}</b><br>
                           <a href="${response.pdfUrl}" target="_blank" style="display:inline-block; background:#dc3545; color:white; padding:12px 24px; text-decoration:none; border-radius:8px; font-weight:bold; box-shadow:0 4px 6px rgba(0,0,0,0.1); margin-top:15px;">
                           📄 ดาวน์โหลดใบเบิก
                           </a>`,
                    icon: 'success',
                    confirmButtonText: 'ปิดหน้าต่าง'
                }).then(() => {
                    document.getElementById("myForm").reset();
                    $("#itemTable tbody").empty();
                    addNewRow(); 
                    document.getElementById("payTo").readOnly = false;
                });
            } else {
                Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + response.message, 'error');
            }
        })
        .catch(err => {
            loading.style.display = 'none';
            btn.style.display = 'block';
            Swal.fire('Error', 'การเชื่อมต่อล้มเหลว: ' + err.message, 'error');
        });
    });
  }
</script>

</body>
</html>
