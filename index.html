<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบลงทะเบียนเบิกจ่าย (Reimbursement System)</title>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Kanit', sans-serif; }
    
    /* ปรับแต่ง Select2 ให้เข้ากับ Tailwind */
    .select2-container .select2-selection--single {
      height: 48px !important;
      border-radius: 0.5rem !important;
      border: 1px solid #e2e8f0 !important;
      display: flex; align-items: center;
      background-color: #f8fafc !important;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
      color: #334155 !important; 
      padding-left: 1rem;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 46px !important;
    }
    .select2-dropdown {
      border: 1px solid #e2e8f0 !important;
      border-radius: 0.5rem !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
    }
    
    /* ปรับช่อง Input ในตารางให้เนียนตา */
    td input[type="text"], td input[type="number"], td input[type="date"] {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid transparent;
      border-radius: 0.375rem;
      background-color: #f8fafc;
      transition: all 0.2s;
    }
    td input[type="text"]:focus, td input[type="number"]:focus, td input[type="date"]:focus {
      border-color: #3b82f6;
      background-color: #fff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    
    .table-container { overflow-x: auto; }
    table { min-width: 950px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen py-10 px-4">

<div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
  
  <div class="bg-gradient-to-r from-blue-700 to-indigo-800 py-8 px-8 text-center relative overflow-hidden">
    <div class="relative z-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-3 shadow-lg">
        <i class="fa-solid fa-file-invoice-dollar text-3xl text-blue-600"></i>
      </div>
      <h2 class="text-2xl md:text-3xl font-bold text-white mb-1">ระบบลงทะเบียนเบิกจ่าย</h2>
      <p class="text-blue-100 text-sm md:text-base font-light">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อดำเนินการออกเอกสารเบิกจ่าย</p>
    </div>
    <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
      <div class="absolute -top-10 -left-10 w-40 h-40 bg-white rounded-full mix-blend-overlay"></div>
      <div class="absolute top-20 right-10 w-64 h-64 bg-white rounded-full mix-blend-overlay"></div>
    </div>
  </div>

  <div class="p-6 md:p-10">
    <form id="myForm" onsubmit="submitForm(event)">
      
      <h3 class="text-lg font-semibold text-slate-800 mb-5 border-b border-slate-200 pb-2">
        <i class="fa-solid fa-user-tag text-blue-500 mr-2"></i>ข้อมูลทั่วไป
      </h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">📑 ประเภทการเบิก (Type) <span class="text-red-500">*</span></label>
          <select id="reimbursement" required onchange="checkPayToLogic()" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
            <option value="" disabled selected>กำลังโหลดข้อมูล...</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">👤 สั่งจ่าย (Pay To) <span class="text-red-500">*</span></label>
          <input type="text" id="payTo" placeholder="ระบุผู้รับเงิน" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">😊 ดำเนินการโดย (Operator) <span class="text-red-500">*</span></label>
          <input type="text" id="operator" placeholder="เช่น สมชาย ใจดี" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">📅 วันที่คาดว่าจะจ่าย (Payment Date) <span class="text-red-500">*</span></label>
          <input type="date" id="paymentDate" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 text-slate-600">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">💼 ตำแหน่ง (Position) <span class="text-red-500">*</span></label>
          <input type="text" id="position" placeholder="ระบุตำแหน่ง" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">👥 ทีม (Team) <span class="text-red-500">*</span></label>
          <input type="text" id="team" placeholder="ระบุทีม" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-semibold text-slate-700 mb-1">🎯 วัตถุประสงค์ (Objective) <span class="text-red-500">*</span></label>
        <input type="text" id="objective" placeholder="ระบุวัตถุประสงค์ในการเบิกจ่าย" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50">
      </div>

      <div class="mb-10 bg-slate-50 p-5 rounded-xl border border-slate-200 border-dashed">
        <label class="block text-sm font-semibold text-slate-700 mb-2"><i class="fa-solid fa-paperclip text-slate-400 mr-2"></i> แนบไฟล์หลักฐาน (สลิป/ใบเสร็จ) <span class="text-red-500">*</span></label>
        <input type="file" id="fileAttach" accept=".jpg, .jpeg, .png" multiple required class="w-full text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition cursor-pointer">
        <p class="text-xs text-slate-500 mt-2">รองรับเฉพาะไฟล์รูปภาพ JPG/PNG (เลือกได้หลายรูป ขนาดรวมไม่เกิน 20MB)</p>
      </div>

      <div class="flex justify-between items-end border-b border-slate-200 pb-2 mb-4">
        <h3 class="text-lg font-semibold text-slate-800"><i class="fa-solid fa-list-check text-blue-500 mr-2"></i>รายการค่าใช้จ่าย</h3>
        <button type="button" onclick="addNewRow()" class="text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg transition duration-200">
          <i class="fa-solid fa-plus mr-1"></i> เพิ่มรายการ
        </button>
      </div>

      <div class="table-container rounded-xl border border-slate-200 shadow-sm mb-8">
        <table id="itemTable" class="w-full text-left border-collapse">
          <thead class="bg-slate-100 border-b border-slate-200">
            <tr>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide" width="13%">📅 Date <span class="text-red-500">*</span></th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide" width="15%">🔢 QT/Project <span class="text-red-500">*</span></th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide" width="30%">📝 Description <span class="text-red-500">*</span></th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide" width="15%">💰 Amount <span class="text-red-500">*</span></th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide text-center" width="8%">VAT 7%</th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide" width="10%">WHT %</th>
              <th class="p-3 text-xs font-semibold text-slate-600 uppercase tracking-wide text-center" width="9%">ลบ</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100 bg-white">
            </tbody>
        </table>
      </div>

      <div class="mt-10">
        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-md hover:shadow-lg hover:from-blue-700 hover:to-indigo-700 transform hover:-translate-y-1 transition duration-200 text-lg flex justify-center items-center">
          <i class="fa-solid fa-paper-plane mr-2"></i> ส่งข้อมูลเบิกจ่าย
        </button>
        <div id="loadingText" class="hidden mt-4 text-center text-blue-600 font-semibold animate-pulse">
          <i class="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังบันทึกข้อมูลและสร้างไฟล์ PDF... โปรดรอสักครู่
        </div>
      </div>

    </form>
  </div>
</div>

<script>
  // ⚠️ 1. วางลิงก์ Web App ที่ Deploy เป็น "ทุกคน (Anyone)" แล้วตรงนี้ครับ
  const API_URL = 'https://script.google.com/macros/s/AKfycbzwfN01Cy44vO2ZqrI-paGCWg7r1WVw-gKyaoslklG2uawl11G77Sngnzn4DNsDS-P5Kw/exec';

  var dropdownMapping = [];
  var descOptions = []; 

  $(document).ready(function() {
      fetch(API_URL + "?action=getOptions")
        .then(response => response.json())
        .then(data => {
            if(data.error) {
                Swal.fire('Error', 'โหลดข้อมูลตั้งต้นไม่สำเร็จ: ' + data.error, 'error');
            } else {
                initData(data);
            }
        })
        .catch(err => {
            Swal.fire('การเชื่อมต่อล้มเหลว', 'โปรดตรวจสอบลิงก์ API หรือสิทธิ์การเข้าถึง Web App ว่าตั้งเป็น Anyone แล้วหรือยัง', 'error');
        });
  });

  function initData(data) {
    var reimSelect = document.getElementById("reimbursement");
    reimSelect.innerHTML = '<option value="" disabled selected>เลือกประเภท...</option>';
    dropdownMapping = data.reimbursement;
    data.reimbursement.forEach(r => {
      var opt = new Option(r[0], r[0]);
      reimSelect.add(opt);
    });
    descOptions = data.descriptions.map(d => d[0]).filter(d => d);
    addNewRow();
  }

  function addNewRow() {
    var table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
    var rowIdx = table.rows.length;
    var row = table.insertRow(rowIdx);
    row.className = "hover:bg-slate-50 transition-colors";
    
    var cellDate = row.insertCell(0);
    cellDate.className = "p-2";
    cellDate.innerHTML = `<input type="date" class="item-date" required>`;
    
    var cellProj = row.insertCell(1);
    cellProj.className = "p-2";
    cellProj.innerHTML = `<input type="text" class="item-project" placeholder="เลขที่..." required>`;

    var cellDesc = row.insertCell(2);
    cellDesc.className = "p-2";
    var selectHtml = `<select class="desc-select" required style="width:100%"><option value="" disabled selected>ค้นหารายการ...</option>`;
    descOptions.forEach(opt => { selectHtml += `<option value="${opt}">${opt}</option>`; });
    selectHtml += `</select>`;
    cellDesc.innerHTML = selectHtml;

    var cellAmount = row.insertCell(3);
    cellAmount.className = "p-2";
    cellAmount.innerHTML = `<input type="number" class="amount-input" step="0.01" placeholder="0.00" required>`;
    
    var cellVat = row.insertCell(4);
    cellVat.className = "p-2 text-center";
    cellVat.innerHTML = `<input type="checkbox" class="vat-check cursor-pointer w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">`;

    var cellWht = row.insertCell(5);
    cellWht.className = "p-2";
    cellWht.innerHTML = `<input type="number" class="wht-input" step="0.5" placeholder="%" min="0">`;

    var cellAction = row.insertCell(6);
    cellAction.className = "p-2 text-center";
    if(rowIdx > 0) {
        cellAction.innerHTML = `<button type="button" class="btn-remove text-red-500 hover:text-white hover:bg-red-500 w-8 h-8 rounded-full transition shadow-sm" onclick="removeRow(this)"><i class="fa-solid fa-trash-can"></i></button>`;
    }

    $(row).find('.desc-select').select2({
        placeholder: "เลือกรายการ...",
        allowClear: true,
        width: '100%',
        language: { noResults: function() { return "ไม่พบข้อมูล"; } }
    });
  }

  function removeRow(btn) {
    var row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
  }

  function checkPayToLogic() {
    var selectedType = document.getElementById("reimbursement").value;
    var payToInput = document.getElementById("payTo");
    var autoFillTypes = ["Petty Cash - Internal and HR", "Petty Cash - Production", "Reimburstment K. Phol", "Reimburstment K. Vich"];
    if (autoFillTypes.includes(selectedType)) {
      var found = dropdownMapping.find(r => r[0] === selectedType);
      var defaultValue = found && found[1] ? found[1] : selectedType; 
      payToInput.value = defaultValue;
      payToInput.readOnly = true;
      payToInput.classList.add("bg-slate-200");
    } else {
      payToInput.value = "";
      payToInput.readOnly = false;
      payToInput.placeholder = "ระบุผู้รับเงิน";
      payToInput.classList.remove("bg-slate-200");
    }
  }

  function readFiles(files) {
    return Promise.all(Array.from(files).map(file => {
      return new Promise((resolve, reject) => {
        var reader = new FileReader();
        reader.onload = e => resolve({
          name: file.name,
          mimeType: file.type,
          data: e.target.result.split(',')[1] 
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }));
  }

  function submitForm(e) {
    e.preventDefault();
    
    var btn = document.getElementById('submitBtn');
    var loading = document.getElementById('loadingText');
    var fileInput = document.getElementById('fileAttach');
    if (fileInput.files.length === 0) { Swal.fire({ icon: 'warning', title: 'ข้อควรระวัง', text: 'กรุณาแนบไฟล์สลิปหรือใบเสร็จด้วยครับ' }); return; }
    
    var totalSize = 0;
    for(var i=0; i<fileInput.files.length; i++){ totalSize += fileInput.files[i].size; }
    if (totalSize > 20 * 1024 * 1024) { Swal.fire('ขนาดไฟล์เกิน', 'กรุณาอัปโหลดรวมกันไม่เกิน 20MB', 'warning'); return; }

    var headerData = {
        reimbursement: document.getElementById("reimbursement").value,
        payTo: document.getElementById("payTo").value,
        operator: document.getElementById("operator").value,
        paymentDate: document.getElementById("paymentDate").value,
        position: document.getElementById("position").value,
        team: document.getElementById("team").value,
        objective: document.getElementById("objective").value
    };
    
    var items = [];
    var table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
    for (var i = 0; i < table.rows.length; i++) {
        var row = table.rows[i];
        var itemDateVal = row.querySelector('.item-date').value;
        var projectVal = row.querySelector('.item-project').value;
        var descVal = $(row).find('.desc-select').val();
        var amountVal = row.querySelector('.amount-input').value;
        var hasVat = row.querySelector('.vat-check').checked;
        var whtVal = row.querySelector('.wht-input').value;

        if(!itemDateVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุวันที่ (Date) ในรายการที่ ' + (i+1), 'warning'); return; }
        if(!projectVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุ QT/Project No. ในรายการที่ ' + (i+1), 'warning'); return; }
        if(!descVal) { Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกรายการ (Description)', 'warning'); return; }

        items.push({ 
            itemDate: itemDateVal,
            projectNo: projectVal,
            description: descVal, 
            amount: amountVal, 
            hasVat: hasVat, 
            whtPercent: whtVal 
        });
    }

    if(items.length === 0) { Swal.fire('Error', 'กรุณาเพิ่มรายการอย่างน้อย 1 รายการ', 'error'); return; }

    btn.style.display = 'none';
    loading.style.display = 'block';
    
    readFiles(fileInput.files).then(function(fileObjs) {
        var formData = { header: headerData, items: items, files: fileObjs };
        
        fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' 
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(response => {
            loading.style.display = 'none';
            btn.style.display = 'flex';
            if(response.success) {
                Swal.fire({
                    title: 'บันทึกข้อมูลสำเร็จ!',
                    html: `ระบบได้สร้างเอกสารรหัส: <b>${response.docId}</b><br><br>
                           <a href="${response.pdfUrl}" target="_blank" style="display:inline-block; background-color:#2563eb; color:white; padding:10px 20px; text-decoration:none; border-radius:6px; font-weight:bold; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                           <i class="fa-solid fa-file-pdf mr-2"></i> ดาวน์โหลดใบเบิก (PDF)
                           </a>`,
                    icon: 'success',
                    confirmButtonText: 'ปิดหน้าต่าง',
                    confirmButtonColor: '#64748b'
                }).then(() => {
                    document.getElementById("myForm").reset();
                    $("#itemTable tbody").empty();
                    addNewRow(); 
                    document.getElementById("payTo").readOnly = false;
                    document.getElementById("payTo").classList.remove("bg-slate-200");
                });
            } else {
                Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + response.message, 'error');
            }
        })
        .catch(err => {
            loading.style.display = 'none';
            btn.style.display = 'flex';
            Swal.fire('การเชื่อมต่อขัดข้อง', 'โปรดตรวจสอบสัญญาณอินเทอร์เน็ตหรือลิงก์ API', 'error');
        });
    });
  }
</script>

</body>
</html>
