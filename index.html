<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบออกบิลออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">ออกบิลใบเสร็จ</h2>
        
        <form id="billingForm" onsubmit="submitForm(event)">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">ชื่อลูกค้า</label>
                <input type="text" id="customerName" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">จำนวนเงิน (บาท)</label>
                <input type="number" id="amount" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-medium mb-2">แนบสลิปโอนเงิน</label>
                <input type="file" id="slipImage" accept="image/*" class="w-full px-4 py-2 border rounded-lg">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                บันทึกและสร้าง PDF
            </button>
        </form>
    </div>

    <script>
        // ⚠️ 1. เอาลิงก์ Web App ที่ก๊อปปี้มาจาก Google Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้เลยครับ
        const API_URL = 'ใส่_URL_WEB_APP_ที่ก๊อปปี้มา_ตรงนี้';

        // 📌 ฟังก์ชันพิเศษ: แปลงไฟล์รูปภาพให้เป็นรหัสตัวอักษร (Base64)
        function getBase64(file) {
           return new Promise((resolve, reject) => {
             const reader = new FileReader();
             reader.readAsDataURL(file);
             reader.onload = () => {
               // ลบหัวข้อความ data:image/jpeg;base64, ออก เอาแค่รหัสเพียวๆ
               let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
               if ((encoded.length % 4) > 0) { encoded += '='.repeat(4 - (encoded.length % 4)); }
               resolve(encoded);
             };
             reader.onerror = error => reject(error);
           });
        }

        // 📌 ฟังก์ชันเมื่อกดปุ่มบันทึก
        async function submitForm(event) {
            event.preventDefault(); // ป้องกันเว็บโหลดใหม่
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
            btn.disabled = true;

            try {
                // 2. เตรียมข้อมูลที่ลูกค้ากรอก
                let payload = {
                    customerName: document.getElementById('customerName').value,
                    amount: document.getElementById('amount').value,
                    fileBase64: "",
                    fileName: "",
                    mimeType: ""
                };

                // 3. ถ้ามีการแนบไฟล์ ให้แปลงไฟล์เป็น Base64
                const fileInput = document.getElementById('slipImage');
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    payload.fileName = file.name;
                    payload.mimeType = file.type;
                    payload.fileBase64 = await getBase64(file); // รอให้แปลงรหัสเสร็จ
                }

                // 4. ยิงข้อมูล (Fetch) วิ่งไปหา Google Apps Script API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    // แนะนำให้ใช้ text/plain เพื่อแก้ปัญหา Google บล็อกข้ามโดเมน (CORS)
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json(); // รอรับคำตอบจาก Google

                // 5. แจ้งเตือนผลลัพธ์บนหน้าจอ
                if (result.success) {
                    Swal.fire({
                        title: 'สำเร็จ!',
                        text: 'บันทึกข้อมูลและออกบิลเรียบร้อยแล้ว',
                        icon: 'success',
                        footer: `<a href="${result.pdfUrl}" target="_blank" style="color: blue; font-weight: bold;">📥 คลิ๊กที่นี่เพื่อดาวน์โหลด PDF</a>`
                    });
                    document.getElementById('billingForm').reset(); // ล้างฟอร์ม
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
                }

            } catch (error) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error, 'error');
            } finally {
                btn.innerText = "บันทึกและสร้าง PDF";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
